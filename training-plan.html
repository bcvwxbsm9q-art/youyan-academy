<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>培训计划 - 游雁学院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style>
        body { opacity: 0; animation: pageLoad 0.5s ease forwards; }
        @keyframes pageLoad { to { opacity: 1; } }
        .container-responsive { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .bg-gradient-primary {
            background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-modal-in { animation: modalIn 0.3s ease-out; }
        .animate-slide-in { animation: slideIn 0.3s ease-out; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-primary:hover { background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <div id="day-modal" style="display: none; position: fixed; inset: 0; z-index: 50; align-items: center; justify-content: center; padding: 1rem;">
        <div onclick="closeDayModal()" style="position: absolute; inset: 0; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(8px);"></div>
        <div style="position: relative; background-color: white; border-radius: 1rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); width: 100%; max-width: 520px; max-height: 80vh; overflow: hidden; animation: modalIn 0.3s ease-out;">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 1.5rem; color: white;">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <div id="modal-date" style="font-size: 0.875rem; opacity: 0.9; margin-bottom: 0.25rem;">2026年1月1日 周五</div>
                        <div id="modal-title" style="font-size: 1.5rem; font-weight: bold;">课程安排</div>
                    </div>
                    <button onclick="closeDayModal()" style="width: 2.5rem; height: 2.5rem; border-radius: 50%; background-color: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; hover:bg-white/30;">
                        <i class="fa fa-times" style="font-size: 1.25rem;"></i>
                    </button>
                </div>
            </div>
            <div id="modal-content" style="padding: 1.5rem; max-height: 50vh; overflow-y: auto;">
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 0; color: #9ca3af;">
                    <div style="width: 6rem; height: 6rem; border-radius: 50%; background-color: #f3f4f6; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem;">
                        <i class="fa fa-calendar-o" style="font-size: 4rem; color: #d1d5db;"></i>
                    </div>
                    <p style="color: #9ca3af; font-size: 1rem;">当天暂无课程安排</p>
                    <p style="color: #cbd5e1; font-size: 0.875rem; margin-top: 0.5rem;">您可以查看其他日期的课程</p>
                </div>
            </div>
        </div>
    </div>

    <div id="course-detail-modal" style="display: none; position: fixed; inset: 0; z-index: 50; align-items: center; justify-content: center; padding: 1rem;">
        <div onclick="closeCourseDetailModal()" style="position: absolute; inset: 0; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(8px);"></div>
        <div style="position: relative; background-color: white; border-radius: 1rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); width: 100%; max-width: 520px; overflow: hidden; animation: modalIn 0.3s ease-out;">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 1.5rem; color: white;">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <div id="detail-category" style="font-size: 0.875rem; opacity: 0.9; margin-bottom: 0.25rem;">新雁计划</div>
                        <div id="detail-title" style="font-size: 1.5rem; font-weight: bold;">课程详情</div>
                    </div>
                    <button onclick="closeCourseDetailModal()" style="width: 2.5rem; height: 2.5rem; border-radius: 50%; background-color: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;">
                        <i class="fa fa-times" style="font-size: 1.25rem;"></i>
                    </button>
                </div>
            </div>
            <div id="detail-content" style="padding: 1.5rem;">
            </div>
        </div>
    </div>

    <!-- 培训需求提交弹窗 -->
    <div id="training-request-modal" style="display: none; position: fixed; inset: 0; z-index: 50; align-items: center; justify-content: center; padding: 1rem;">
        <div onclick="closeTrainingRequestModal()" style="position: absolute; inset: 0; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(8px);"></div>
        <div style="position: relative; background-color: white; border-radius: 1rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); width: 100%; max-width: 560px; max-height: 90vh; overflow: hidden; animation: modalIn 0.3s ease-out;">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 1.5rem; color: white;">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <div style="font-size: 0.875rem; opacity: 0.9; margin-bottom: 0.25rem;">Training Request</div>
                        <div style="font-size: 1.5rem; font-weight: bold;">提交培训需求</div>
                    </div>
                    <button onclick="closeTrainingRequestModal()" style="width: 2.5rem; height: 2.5rem; border-radius: 50%; background-color: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;">
                        <i class="fa fa-times" style="font-size: 1.25rem;"></i>
                    </button>
                </div>
            </div>
            <div style="padding: 1.5rem; max-height: 70vh; overflow-y: auto;">
                <form id="training-request-form" onsubmit="submitTrainingRequest(event)">
                    <!-- 基本信息 - 自动填充，可手动修改 -->
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem;">
                        <div>
                            <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">
                                <i class="fa fa-user mr-1 text-primary"></i>姓名 <span style="color: #ef4444;">*</span>
                            </label>
                            <input type="text" id="req-name" required style="width: 100%; padding: 0.625rem 0.875rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 0.875rem; outline: none; transition: all 0.2s;" placeholder="请输入您的姓名">
                        </div>
                        <div>
                            <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">
                                <i class="fa fa-building mr-1 text-primary"></i>部门 <span style="color: #ef4444;">*</span>
                            </label>
                            <input type="text" id="req-department" required style="width: 100%; padding: 0.625rem 0.875rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 0.875rem; outline: none; transition: all 0.2s;" placeholder="请输入您的部门">
                        </div>
                    </div>

                    <!-- 培训需求信息 -->
                    <div style="margin-bottom: 1.25rem;">
                        <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">
                            <i class="fa fa-tag mr-1 text-primary"></i>培训类型 <span style="color: #ef4444;">*</span>
                        </label>
                        <select id="req-type" required style="width: 100%; padding: 0.625rem 0.875rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 0.875rem; outline: none; transition: all 0.2s; background-color: white;">
                            <option value="">请选择培训类型</option>
                            <option value="技能培训">技能培训</option>
                            <option value="管理培训">管理培训</option>
                            <option value="软技能培训">软技能培训</option>
                            <option value="新技术培训">新技术培训</option>
                            <option value="认证培训">认证培训</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 1.25rem;">
                        <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">
                            <i class="fa fa-graduation-cap mr-1 text-primary"></i>培训主题/课程名称 <span style="color: #ef4444;">*</span>
                        </label>
                        <input type="text" id="req-topic" required style="width: 100%; padding: 0.625rem 0.875rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 0.875rem; outline: none; transition: all 0.2s;" placeholder="请输入您希望参加的培训主题">
                    </div>

                    <div style="margin-bottom: 1.25rem;">
                        <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">
                            <i class="fa fa-users mr-1 text-primary"></i>培训对象
                        </label>
                        <input type="text" id="req-target" style="width: 100%; padding: 0.625rem 0.875rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 0.875rem; outline: none; transition: all 0.2s;" placeholder="如：部门全员/新员工/特定岗位">
                    </div>

                    <div style="margin-bottom: 1.25rem;">
                        <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">
                            <i class="fa fa-calendar mr-1 text-primary"></i>期望时间
                        </label>
                        <input type="text" id="req-time" style="width: 100%; padding: 0.625rem 0.875rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 0.875rem; outline: none; transition: all 0.2s;" placeholder="如：2026年Q2/尽快安排/具体时间">
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">
                            <i class="fa fa-comment mr-1 text-primary"></i>需求描述/备注
                        </label>
                        <textarea id="req-description" rows="4" style="width: 100%; padding: 0.625rem 0.875rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 0.875rem; outline: none; transition: all 0.2s; resize: vertical;" placeholder="请详细描述您的培训需求，包括培训目的、预期效果、人数规模等..."></textarea>
                    </div>

                    <!-- 提交按钮 -->
                    <div style="display: flex; gap: 0.75rem;">
                        <button type="button" onclick="closeTrainingRequestModal()" style="flex: 1; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: #6b7280; background-color: white; cursor: pointer; transition: all 0.2s;">
                            取消
                        </button>
                        <button type="submit" style="flex: 1; padding: 0.75rem; border: none; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: white; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); cursor: pointer; transition: all 0.2s;">
                            <i class="fa fa-paper-plane mr-1"></i>提交需求
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <header class="bg-white/95 backdrop-blur-md shadow-sm fixed w-full top-0 z-50 transition-all duration-300">
        <div class="container-responsive">
            <div class="flex justify-between items-center py-3">
                <a href="index.html" class="flex items-center space-x-2 group">
                    <div class="w-10 h-10 rounded-xl bg-gradient-primary flex items-center justify-center shadow-lg group-hover:shadow-xl transition-shadow">
                        <i class="fa fa-graduation-cap text-white text-xl"></i>
                    </div>
                    <span class="text-xl font-bold text-gradient hidden sm:block">游雁学院</span>
                </a>
                
                <nav class="hidden md:flex space-x-1">
                    <a href="index.html" class="nav-item px-4 py-2 rounded-lg text-gray-600 hover:text-primary hover:bg-primary/5 transition-colors">首页</a>
                    <a href="training-plan.html" class="nav-item active px-4 py-2 rounded-lg text-primary font-medium hover:bg-primary/5 transition-colors">培训</a>
                    <a href="course.html" class="nav-item px-4 py-2 rounded-lg text-gray-600 hover:text-primary hover:bg-primary/5 transition-colors">课程</a>
                    <a href="teacher.html" class="nav-item px-4 py-2 rounded-lg text-gray-600 hover:text-primary hover:bg-primary/5 transition-colors">讲师</a>
                    <a href="center.html" class="nav-item px-4 py-2 rounded-lg text-gray-600 hover:text-primary hover:bg-primary/5 transition-colors">我的</a>
                </nav>
                
                <div class="flex items-center space-x-3">
                    <div id="user-info" class="hidden md:flex items-center space-x-3">
                        <div class="w-7 h-7 rounded-full bg-gradient-primary flex items-center justify-center">
                            <i class="fa fa-user text-white text-xs" id="user-avatar-icon"></i>
                        </div>
                        <span class="text-sm font-medium text-primary" id="user-display-name">用户</span>
                        <div class="relative">
                            <button onclick="window.location.href='messages.html'" class="relative p-2 rounded-lg hover:bg-gray-100 transition-colors text-gray-500 hover:text-primary cursor-pointer" title="消息通知">
                                <i class="fa fa-bell text-lg"></i>
                                <span id="notification-badge" class="hidden absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] flex items-center justify-center bg-red-500 text-white text-[10px] font-bold rounded-full px-1">0</span>
                            </button>
                        </div>
                        <button onclick="handleLogout()" id="logout-btn-desktop" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors" title="退出登录">
                            <i class="fa fa-sign-out text-lg"></i>
                        </button>
                    </div>
                    <button class="md:hidden text-gray-600 p-2 hover:bg-gray-100 rounded-lg transition-colors" id="mobile-menu-button" aria-label="菜单">
                        <i class="fa fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="md:hidden hidden bg-white border-t border-gray-100" id="mobile-menu">
            <nav class="container-responsive py-3 flex flex-col space-y-1">
                <a href="index.html" class="flex items-center px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">首页</a>
                <a href="training-plan.html" class="flex items-center px-4 py-3 rounded-lg bg-primary/10 text-primary font-medium">培训</a>
                <a href="course.html" class="flex items-center px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">课程</a>
                <a href="teacher.html" class="flex items-center px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">讲师</a>
                <a href="center.html" class="flex items-center px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">我的</a>
                    <div class="border-t border-gray-100 mt-2 pt-3 flex items-center justify-between px-4">
                        <div id="mobile-user-info" class="hidden flex items-center space-x-2">
                            <div class="w-7 h-7 rounded-full bg-gradient-primary flex items-center justify-center">
                                <i class="fa fa-user text-white text-xs"></i>
                            </div>
                            <span class="text-sm font-medium text-primary" id="mobile-user-name">用户</span>
                        </div>
                        <button onclick="handleLogout()" class="text-sm text-gray-500 hover:text-red-500 transition-colors">退出</button>
                    </div>
            </nav>
        </div>
    </header>

    <main class="pt-20 pb-10">
        <div class="container-responsive">
            <div class="max-w-6xl mx-auto">
                <div class="mb-8">
                    <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-6">
                        <div>
                            <h1 class="text-3xl font-bold text-gray-800 mb-2">培训计划</h1>
                            <p class="text-gray-500">查看和报名公司组织的各类培训课程</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="relative">
                                <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input type="text" id="search-input" placeholder="搜索课程..." class="pl-10 pr-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 w-full sm:w-64">
                            </div>
                            <select id="category-filter" class="appearance-none px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 bg-white pr-10 cursor-pointer">
                                <option value="all">全部分类</option>
                                <option value="新雁计划">新雁计划</option>
                                <option value="游雁学堂">游雁学堂</option>
                                <option value="鸿雁计划">鸿雁计划</option>
                                <option value="AI实践分享">AI实践分享</option>
                                <option value="雏雁训练营">雏雁训练营</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="flex flex-wrap gap-3">
                        <button onclick="filterByCategory('all')" id="cat-all" class="filter-tag active flex items-center gap-2 px-4 py-2 bg-gradient-primary text-white rounded-full text-sm font-medium shadow-lg shadow-purple-500/30">
                            <i class="fa fa-calendar"></i> 全部课程
                        </button>
                        <button onclick="filterByCategory('新雁计划')" id="cat-新雁计划" class="filter-tag flex items-center gap-2 px-4 py-2 bg-orange-100 text-orange-600 rounded-full text-sm font-medium hover:bg-orange-200 transition-colors">
                            <i class="fa fa-rocket"></i> 新雁计划
                        </button>
                        <button onclick="filterByCategory('游雁学堂')" id="cat-游雁学堂" class="filter-tag flex items-center gap-2 px-4 py-2 bg-blue-100 text-blue-600 rounded-full text-sm font-medium hover:bg-blue-200 transition-colors">
                            <i class="fa fa-graduation-cap"></i> 游雁学堂
                        </button>
                        <button onclick="filterByCategory('鸿雁计划')" id="cat-鸿雁计划" class="filter-tag flex items-center gap-2 px-4 py-2 bg-green-100 text-green-600 rounded-full text-sm font-medium hover:bg-green-200 transition-colors">
                            <i class="fa fa-users"></i> 鸿雁计划
                        </button>
                        <button onclick="filterByCategory('AI实践分享')" id="cat-AI实践分享" class="filter-tag flex items-center gap-2 px-4 py-2 bg-amber-100 text-amber-600 rounded-full text-sm font-medium hover:bg-amber-200 transition-colors">
                            <i class="fa fa-laptop"></i> AI实践分享
                        </button>
                        <button onclick="filterByCategory('雏雁训练营')" id="cat-雏雁训练营" class="filter-tag flex items-center gap-2 px-4 py-2 bg-red-100 text-red-600 rounded-full text-sm font-medium hover:bg-red-200 transition-colors">
                            <i class="fa fa-building"></i> 雏雁训练营
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-lg shadow-purple-500/10 p-6 border border-gray-100 mb-6">
                    <div class="flex items-center justify-between mb-6">
                        <button onclick="prevMonth()" class="p-2.5 rounded-xl bg-white border border-gray-100 hover:bg-gray-50 hover:shadow-md hover:-translate-y-0.5 transition-all duration-300 text-gray-500 hover:text-primary">
                            <i class="fa fa-chevron-left text-lg"></i>
                        </button>
                        <div class="flex items-center gap-4">
                            <h2 class="text-xl font-semibold text-gray-800" id="current-month">2026年1月</h2>
                            <button onclick="goToToday()" class="px-3 py-1.5 text-sm bg-primary/10 text-primary rounded-lg hover:bg-primary/20 transition-colors">
                                <i class="fa fa-calendar-check-o mr-1"></i>今天
                            </button>
                        </div>
                        <button onclick="nextMonth()" class="p-2.5 rounded-xl bg-white border border-gray-100 hover:bg-gray-50 hover:shadow-md hover:-translate-y-0.5 transition-all duration-300 text-gray-500 hover:text-primary">
                            <i class="fa fa-chevron-right text-lg"></i>
                        </button>
                    </div>

                    <div class="grid grid-cols-7 gap-2 mb-2">
                        <div class="text-center text-sm font-medium text-gray-500 py-2">周日</div>
                        <div class="text-center text-sm font-medium text-gray-500 py-2">周一</div>
                        <div class="text-center text-sm font-medium text-gray-500 py-2">周二</div>
                        <div class="text-center text-sm font-medium text-gray-500 py-2">周三</div>
                        <div class="text-center text-sm font-medium text-gray-500 py-2">周四</div>
                        <div class="text-center text-sm font-medium text-gray-500 py-2">周五</div>
                        <div class="text-center text-sm font-medium text-gray-500 py-2">周六</div>
                    </div>
                    <div class="grid grid-cols-7 gap-2" id="calendar-grid">
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 bg-white rounded-xl shadow-sm p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-semibold text-gray-800 flex items-center">
                                <i class="fa fa-calendar-check-o mr-2 text-primary"></i>当月课程列表

    <script>
        // 退出登录（使用统一认证模块）
        function handleLogout() {
            AuthGuard.logout();
        }
        
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let currentCategoryFilter = 'all';
        let currentSearchTerm = '';

        let courses = [];
        let instructorsMap = {};
        // 报名数据从服务器加载，不再使用 localStorage
        let enrollMap = {}; // courseId -> { enrolledUsers: [], enrollCount: N, isEnrolled: bool }

        async function loadLecturers() {
            try {
                const res = await fetch('/api/lecturers');
                const json = await res.json();
                if (json.success && json.data) {
                    json.data.forEach(l => {
                        instructorsMap[l.name] = {
                            avatar: l.avatar && l.avatar.startsWith('/uploads/') ? l.avatar : '',
                            title: l.title || l.levelName || '',
                            department: l.department || ''
                        };
                    });
                }
            } catch (e) {
                console.log('讲师数据加载失败:', e.message);
            }
        }

        function getInstructorInfo(name) {
            if (instructorsMap[name]) return instructorsMap[name];
            // 兜底：用 DiceBear 生成头像（修正 URL 拼写）
            const seed = encodeURIComponent(name);
            return {
                avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}`,
                title: ''
            };
        }

        async function loadTrainingSchedule() {
            try {
                await loadLecturers();
                const res = await fetch('/api/training/schedule');
                const json = await res.json();
                if (json.success && json.data && json.data.length > 0) {
                    courses = json.data;
                    // 从服务器数据构建报名状态
                    const user = AuthGuard ? AuthGuard.getCurrentUser() : null;
                    const currentUserId = user ? (user.id || user.userId) : null;
                    enrollMap = {};
                    courses.forEach(c => {
                        const enrolledUsers = c.enrolledUsers || [];
                        const isEnrolled = currentUserId ? enrolledUsers.some(u => u.userId == currentUserId) : false;
                        enrollMap[c.id] = { enrolledUsers, enrollCount: c.enrollCount || enrolledUsers.length, isEnrolled };
                    });
                    const firstDate = new Date(json.data[0].date);
                    if (!isNaN(firstDate.getTime())) {
                        currentYear = firstDate.getFullYear();
                        currentMonth = firstDate.getMonth();
                    }
                } else {
                    // 如果API返回空数据，使用默认测试数据
                    courses = [
                        { id: 1, name: '新员工入职培训', category: '新雁计划', instructor: '黄明芳', date: '2026-01-15', time: '09:00-11:30', duration: '2.5小时', location: '会议室A', projectName: 'Q1培训计划' },
                        { id: 2, name: 'Python进阶培训', category: '游雁学堂', instructor: '曹贺军', date: '2026-01-18', time: '14:00-17:00', duration: '3小时', location: '培训室B', projectName: '技术提升计划' },
                        { id: 3, name: 'AI应用实践分享', category: 'AI实践分享', instructor: '沈家成', date: '2026-01-20', time: '10:00-12:00', duration: '2小时', location: '大会议室', projectName: 'AI学习周' },
                        { id: 4, name: '团队协作软技能', category: '鸿雁计划', instructor: '吴佳宝', date: '2026-01-22', time: '14:00-16:00', duration: '2小时', location: '培训室A', projectName: '软技能培训' },
                        { id: 5, name: '产品设计思维', category: '雏雁训练营', instructor: '黄明芳', date: '2026-01-25', time: '09:00-12:00', duration: '3小时', location: '创新实验室', projectName: '设计培训' },
                        { id: 6, name: '数据可视化实战', category: '游雁学堂', instructor: '曹贺军', date: '2026-01-28', time: '14:00-17:00', duration: '3小时', location: '培训室B', projectName: '技术提升计划' },
                        { id: 7, name: '沟通技巧培训', category: '鸿雁计划', instructor: '吴佳宝', date: '2026-02-01', time: '10:00-12:00', duration: '2小时', location: '会议室A', projectName: '软技能培训' },
                        { id: 8, name: '机器学习入门', category: 'AI实践分享', instructor: '沈家成', date: '2026-02-05', time: '09:00-12:00', duration: '3小时', location: '大会议室', projectName: 'AI学习周' },
                    ];

                console.log('培训日历加载失败:', e.message);

                    { id: 1, name: '新员工入职培训', category: '新雁计划', instructor: '黄明芳', date: '2026-01-15', time: '09:00-11:30', duration: '2.5小时', location: '会议室A', projectName: 'Q1培训计划' },
                    { id: 2, name: 'Python进阶培训', category: '游雁学堂', instructor: '曹贺军', date: '2026-01-18', time: '14:00-17:00', duration: '3小时', location: '培训室B', projectName: '技术提升计划' },
                ];

        async function toggleEnroll(courseId) {
            const user = AuthGuard ? AuthGuard.getCurrentUser() : null;
            const userId = user ? (user.id || user.userId) : null;
            if (!userId) { showToast('请先登录后再报名'); return; }

            const info = enrollMap[courseId] || { enrolledUsers: [], enrollCount: 0, isEnrolled: false };
            const btn = event ? event.target.closest('button') : null;
            if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }

            try {
                if (info.isEnrolled) {
                    // 取消报名
                    const res = await fetch('/api/training/' + courseId + '/enroll', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId })
                    });
                    const result = await res.json();
                    if (result.success) {
                        info.isEnrolled = false;
                        info.enrollCount = result.enrollCount;
                        info.enrolledUsers = info.enrolledUsers.filter(u => u.userId != userId);
                        enrollMap[courseId] = info;
                        showToast('已取消报名');
                    } else {
                        showToast(result.error || '取消失败', true);
                    }
                } else {
                    // 报名
                    const res = await fetch('/api/training/' + courseId + '/enroll', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId })
                    });
                    const result = await res.json();
                    if (result.success) {
                        info.isEnrolled = true;
                        info.enrollCount = result.enrollCount;
                        const userName = user.realName || user.real_name || user.username || '我';
                        info.enrolledUsers.push({ userId, name: userName, avatar: user.avatar || '', department: user.department || '' });
                        enrollMap[courseId] = info;
                        showToast('报名成功！');
                    } else {
                        showToast(result.error || '报名失败', true);
                    }
                }
            } catch (e) {
                showToast('网络错误，请稍后重试', true);
            } finally {
                if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
            }
            renderCalendar();
            renderMonthlyCourses();
        }

        function showToast(message, isError) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-lg text-sm z-50 animate-fade-in ' + (isError ? 'bg-red-500 text-white' : 'bg-gray-800 text-white');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 2000);
        }

        // 渲染报名者头像网格
        function renderEnrolledAvatars(courseId) {
            const info = enrollMap[courseId];
            if (!info || !info.enrolledUsers || info.enrolledUsers.length === 0) {
                return `<div class="flex items-center mt-2 text-xs text-gray-400"><i class="fa fa-user-o mr-1"></i>暂无人报名</div>`;
            }
            const users = info.enrolledUsers;
            const maxShow = 6;
            const showUsers = users.slice(0, maxShow);
            const remaining = users.length - maxShow;
            let html = '<div class="mt-2.5 pt-2.5 border-t border-gray-200/60">';
            html += '<div class="text-[11px] text-gray-400 mb-1.5"><i class="fa fa-users mr-1"></i>已报名 (' + info.enrollCount + '人)</div>';
            html += '<div class="flex flex-wrap gap-1.5">';
            showUsers.forEach(u => {
                html += `<span class="inline-flex items-center px-2 py-0.5 bg-white border border-gray-200 rounded-full text-xs text-gray-700 shadow-sm" title="${u.department || ''}">${u.name}</span>`;
            });
            if (remaining > 0) {
                html += `<span class="inline-flex items-center justify-center h-6 min-w-[28px] px-1.5 rounded-full bg-gray-100 text-[11px] text-gray-500 font-medium">+${remaining}人</span>`;
            }
            html += '</div></div>';
            return html;
        }

        const holidays = {
            '2026-01-01': '元旦',
            '2026-01-28': '春节',
            '2026-01-29': '春节',
            '2026-01-30': '春节',

            '2026-02-03': '春节',
            '2026-04-04': '清明',
            '2026-04-05': '清明',
            '2026-05-01': '劳动节',

            '2026-06-19': '端午',
            '2026-06-20': '端午',
            '2026-09-25': '中秋',
            '2026-10-01': '国庆',

        };

        function getDayTypeName(category) {
            const names = {
                '策划': '新雁计划',
                '技术': '游雁学堂',
                '软技能': '鸿雁计划',
                '市场': 'AI实践分享',
                '美术': '雏雁训练营',
                '新雁计划': '新雁计划',
                '游雁学堂': '游雁学堂',
                '鸿雁计划': '鸿雁计划',
                'AI实践分享': 'AI实践分享',
                '雏雁训练营': '雏雁训练营'
            };
            return names[category] || category;
        }

        function getDayTypeClass(category) {
            const classes = {
                '策划': 'bg-orange-100 text-orange-700',
                '技术': 'bg-blue-100 text-blue-700',
                '软技能': 'bg-green-100 text-green-700',
                '市场': 'bg-amber-100 text-amber-700',
                '美术': 'bg-pink-100 text-pink-700',
                '新雁计划': 'bg-orange-100 text-orange-700',
                '游雁学堂': 'bg-blue-100 text-blue-700',
                '鸿雁计划': 'bg-green-100 text-green-700',
                'AI实践分享': 'bg-amber-100 text-amber-700',
                '雏雁训练营': 'bg-pink-100 text-pink-700'
            };
            return classes[category] || 'bg-gray-100 text-gray-600';
        }

        function getGradientClass(category) {
            const classes = {
                '新雁计划': 'from-orange-400 to-orange-600',
                '游雁学堂': 'from-blue-400 to-blue-600',
                '鸿雁计划': 'from-green-400 to-green-600',
                'AI实践分享': 'from-amber-400 to-amber-600',
                '雏雁训练营': 'from-red-400 to-red-600',
                '策划': 'from-orange-400 to-orange-600',
                '技术': 'from-blue-400 to-blue-600',
                '软技能': 'from-green-400 to-green-600',
                '市场': 'from-amber-400 to-amber-600',
                '美术': 'from-red-400 to-red-600'
            };
            return classes[category] || 'from-gray-400 to-gray-600';
        }

        function getCategoryIcon(category) {
            const icons = {
                '新雁计划': 'fa-rocket',
                '游雁学堂': 'fa-code',
                '鸿雁计划': 'fa-users',
                'AI实践分享': 'fa-laptop',
                '雏雁训练营': 'fa-building',
                '策划': 'fa-lightbulb-o',
                '技术': 'fa-code',
                '软技能': 'fa-users',
                '市场': 'fa-line-chart',
                '美术': 'fa-paint-brush'
            };
            return icons[category] || 'fa-book';
        }

        function getFilteredCourses() {
            let filtered = [...courses];
            
            if (currentCategoryFilter !== 'all') {
                filtered = filtered.filter(c => getDayTypeName(c.category) === currentCategoryFilter);
            }
            
            if (currentSearchTerm) {
                const searchLower = currentSearchTerm.toLowerCase();
                filtered = filtered.filter(c => 
                    c.name.toLowerCase().includes(searchLower) ||
                    c.instructor.toLowerCase().includes(searchLower)
                );
            }
            
            return filtered;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const startDay = firstDay.getDay();

            const filteredCourses = getFilteredCourses();
            const monthCourses = filteredCourses.filter(c => {
                const d = new Date(c.date);
                return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
            });

            for (let i = 0; i < startDay; i++) {
                grid.innerHTML += '<div class="aspect-square"></div>';
            }

            for (let day = 1; day <= lastDay.getDate(); day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayCourses = monthCourses.filter(c => c.date === dateStr);
                const todayLocal = new Date();
                const todayStr = `${todayLocal.getFullYear()}-${String(todayLocal.getMonth()+1).padStart(2,'0')}-${String(todayLocal.getDate()).padStart(2,'0')}`;
                const isToday = dateStr === todayStr;
                const holidayName = holidays[dateStr];
                const weekDay = new Date(currentYear, currentMonth, day).getDay();
                const isWeekend = weekDay === 0 || weekDay === 6;

                let cellClass = 'aspect-square rounded-lg p-2 cursor-pointer transition-all duration-300 border border-gray-100 overflow-hidden';
                if (holidayName) {
                    cellClass += ' bg-gradient-to-br from-red-50 to-red-100 hover:shadow-md hover:-translate-y-0.5';
                } else if (isWeekend) {
                    cellClass += ' bg-gradient-to-br from-purple-50 to-purple-100 hover:shadow-md hover:-translate-y-0.5';
                } else {
                    cellClass += ' bg-gradient-to-br from-white to-gray-50 hover:shadow-md hover:-translate-y-0.5';
                }

                if (isToday) {
                    cellClass += ' ring-2 ring-primary/40 ring-offset-2';
                }

                let coursesHtml = '';
                if (dayCourses.length > 0) {
                    coursesHtml = dayCourses.slice(0, 2).map((c, idx) => {
                        return `
                            <div class="mt-1 truncate">
                                <span class="${getDayTypeClass(c.category)} inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[10px] font-semibold">
                                    <i class="fa ${getCategoryIcon(c.category)}"></i>${getDayTypeName(c.category)}
                                </span>
                                <div class="mt-0.5 text-gray-800 text-[11px] font-medium truncate leading-tight">${c.name}</div>
                                <div class="text-gray-400 text-[10px] truncate leading-tight">${c.instructor || ''}</div>
                            </div>
                        `;
                    }).join('');
                    if (dayCourses.length > 2) {
                        coursesHtml += `<div class="mt-0.5 text-gray-400 text-[10px] text-center">+${dayCourses.length - 2}</div>`;
                    }
                } else if (holidayName) {
                    coursesHtml = `<div class="mt-1 text-red-500 text-xs font-medium text-center">${holidayName}</div>`;
                }

                grid.innerHTML += `
                    <div class="${cellClass}" onclick="showDayCourses('${dateStr}')">
                        <div class="flex flex-col h-full relative overflow-hidden">
                            ${holidayName ? '<span class="absolute top-0 right-0 w-5 h-5 bg-red-500 text-white text-[10px] font-bold rounded flex items-center justify-center shadow-sm">休</span>' : ''}
                            <div class="flex justify-between items-start">
                                <span class="${isToday ? 'bg-primary text-white' : 'bg-purple-100 text-purple-600'} rounded-full w-6 h-6 flex items-center justify-center text-xs font-medium shadow-sm">${day}</span>
                                <span class="text-gray-400 text-[10px]">${dayCourses.length > 0 ? dayCourses.length + '场' : ''}</span>
                            </div>
                            ${coursesHtml}
                        </div>
                    </div>
                `;
            }

            document.getElementById('current-month').textContent = `${currentYear}年${currentMonth + 1}月`;
            renderMonthlyCourses();
        }

        function renderMonthlyCourses() {
            const container = document.getElementById('monthly-courses');
            const filteredCourses = getFilteredCourses();
            const monthCourses = filteredCourses.filter(c => {
                const d = new Date(c.date);
                return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
            });

            document.getElementById('course-count').textContent = monthCourses.length;

            if (monthCourses.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-4">
                            <i class="fa fa-calendar-times text-gray-400 text-3xl"></i>
                        </div>
                        <p class="text-gray-500">暂无课程安排</p>
                        <p class="text-sm text-gray-400 mt-1">试试调整筛选条件</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = monthCourses.map((c, index) => {
                const d = new Date(c.date);
                const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                const instructor = getInstructorInfo(c.instructor);
                const isEnrolled = enrollMap[c.id]?.isEnrolled || false;
                const isFromTraining = !!c.projectName;

                return `
                    <div class="flex gap-4 p-4 bg-gray-50 rounded-xl hover:shadow-md transition-all cursor-pointer card-hover" style="animation-delay: ${index * 0.05}s" onclick="showCourseDetail(${c.id})">
                        <div class="w-14 h-14 rounded-xl bg-gradient-to-br ${getGradientClass(c.category)} flex items-center justify-center flex-shrink-0">
                            <i class="fa ${getCategoryIcon(c.category)} text-white text-lg"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="${getDayTypeClass(c.category)} px-2 py-0.5 rounded-full text-xs font-medium">${getDayTypeName(c.category)}</span>
                                ${isFromTraining ? '<span class="text-[10px] px-1.5 py-0.5 bg-indigo-50 text-indigo-500 rounded">培训项目</span>' : ''}
                            </div>
                            <h4 class="font-semibold text-gray-800 truncate">${c.name}</h4>
                            <div class="flex items-center gap-4 mt-2 text-sm text-gray-500">
                                <div class="flex items-center gap-1.5">

                                    <i class="fa fa-clock-o text-gray-400"></i>

                                ${c.location ? `<span class="flex items-center gap-1"><i class="fa fa-map-marker-alt text-gray-400"></i>${c.location}</span>` : ''}

                        <div class="flex flex-col justify-center items-end">
                            <span class="text-xs text-gray-400 mb-2">${c.duration}</span>

                                    class="${isEnrolled ? 'bg-gray-200 text-gray-600 hover:bg-gray-300' : 'btn-primary text-white hover:opacity-90'} px-4 py-2 rounded-lg font-medium text-sm transition-all">
                                ${isEnrolled ? '已报名' : '我要报名'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showDayCourses(dateStr) {
            const filteredCourses = getFilteredCourses();
            const dayCourses = filteredCourses.filter(c => c.date === dateStr);
            const d = new Date(dateStr);
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            
            document.getElementById('modal-date').textContent = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日 ${weekDays[d.getDay()]}`;
            
            if (dayCourses.length === 0) {
                document.getElementById('modal-content').innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 text-gray-400">
                        <div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center mb-4">
                            <i class="fa fa-calendar-o text-3xl text-gray-300"></i>
                        </div>

                    </div>

            } else {
                let content = '<div class="space-y-4">';
                dayCourses.forEach((c, index) => {

                    content += `

                            <div class="w-12 h-12 rounded-xl bg-gradient-to-br ${getGradientClass(c.category)} flex-shrink-0 flex items-center justify-center">
                                <i class="fa ${getCategoryIcon(c.category)} text-white"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="${getDayTypeClass(c.category)} text-xs px-2 py-0.5 rounded-full">${getDayTypeName(c.category)}</span>
                                    <span class="text-gray-400 text-xs">${c.time}</span>
                                    ${c.location ? `<span class="text-xs text-gray-400"><i class="fa fa-map-marker-alt mr-1"></i>${c.location}</span>` : ''}
                                    ${isFromTraining ? '<span class="text-xs px-1.5 py-0.5 bg-indigo-50 text-indigo-500 rounded">培训</span>' : ''}
                                </div>
                                <h4 class="font-semibold text-gray-800 truncate">${c.name}</h4>
                                <div class="flex items-center gap-2 mt-2">
                                    <img src="${instructor.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=Default'}"
                                         alt="${c.instructor}" class="w-6 h-6 rounded-full object-cover" />
                                    <span class="text-sm text-gray-500">${c.instructor}</span>
                                    <span class="text-xs text-gray-400">${instructor.title}</span>
                                </div>
                                ${renderEnrolledAvatars(c.id)}
                            </div>
                            <div class="flex flex-col justify-center">
                                <span class="text-xs text-gray-400">${c.duration}</span>
                                <button onclick="handleModalEnroll(${c.id})" 
                                        class="${enrollMap[c.id]?.isEnrolled ? 'bg-gray-200 text-gray-500' : 'btn-primary text-white'} mt-1 px-4 py-1.5 rounded-lg text-xs font-medium hover:opacity-90 transition-all">
                                    ${enrollMap[c.id]?.isEnrolled ? '已报名' : '报名'}
                                </button>
                            </div>
                        </div>
                    `;
                });
                content += '</div>';
                document.getElementById('modal-content').innerHTML = content;
            }
            
            document.getElementById('day-modal').style.display = 'flex';
        }

        function closeDayModal() {
            document.getElementById('day-modal').style.display = 'none';
        }

        async function handleModalEnroll(courseId) {
            await toggleEnroll(courseId);
            const d = document.getElementById('day-modal').querySelector('#modal-date').textContent;
            const dateParts = d.match(/(\d+)年(\d+)月(\d+)日/);
            if (dateParts) {
                const dateStr = `${dateParts[1]}-${String(dateParts[2]).padStart(2, '0')}-${String(dateParts[3]).padStart(2, '0')}`;
                showDayCourses(dateStr);
            }
        }

        function showCourseDetail(courseId) {
            const course = courses.find(c => c.id === courseId);
            if (!course) return;

            const d = new Date(course.date);
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const instructor = getInstructorInfo(course.instructor);
            const isEnrolled = enrollMap[courseId]?.isEnrolled || false;

            document.getElementById('detail-category').textContent = getDayTypeName(course.category);
            document.getElementById('detail-title').textContent = course.name;

            document.getElementById('detail-content').innerHTML = `
                <div class="space-y-4">
                    <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-xl">
                        <div class="w-16 h-16 rounded-xl bg-gradient-to-br ${getGradientClass(course.category)} flex items-center justify-center">
                            <i class="fa ${getCategoryIcon(course.category)} text-white text-2xl"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="${getDayTypeClass(course.category)} px-2 py-0.5 rounded-full text-xs font-medium">${getDayTypeName(course.category)}</span>
                                ${course.projectName ? '<span class="text-xs px-1.5 py-0.5 bg-indigo-50 text-indigo-500 rounded">培训项目</span>' : ''}
                            </div>
                            <h3 class="font-bold text-gray-800 mt-1">${course.name}</h3>
                            <p class="text-sm text-gray-500">${course.duration}</p>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <div class="flex items-center gap-3">
                            <img src="${instructor.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=Default'}" 
                                 alt="${course.instructor}" class="w-10 h-10 rounded-full object-cover" />
                            <div>
                                <div class="font-medium text-gray-800">${course.instructor}</div>
                                <div class="text-sm text-gray-400">${instructor.title}</div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="flex items-center gap-2 p-3 bg-gray-50 rounded-lg">
                                <i class="fa fa-calendar-o text-gray-400 w-5"></i>
                                <div>
                                    <div class="text-xs text-gray-400">培训日期</div>
                                    <div class="text-sm font-medium text-gray-800">${d.getMonth() + 1}月${d.getDate()}日 ${weekDays[d.getDay()]}</div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 p-3 bg-gray-50 rounded-lg">
                                <i class="fa fa-clock-o text-gray-400 w-5"></i>
                                <div>
                                    <div class="text-xs text-gray-400">培训时间</div>
                                    <div class="text-sm font-medium text-gray-800">${course.time}</div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 p-3 bg-gray-50 rounded-lg col-span-2">
                                <i class="fa fa-map-marker text-gray-400 w-5"></i>
                                <div>
                                    <div class="text-xs text-gray-400">培训地点</div>
                                    <div class="text-sm font-medium text-gray-800">${course.location || '待定'}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="p-3 bg-gray-50 rounded-xl">${renderEnrolledAvatars(courseId)}</div>

                    <div class="p-4 bg-blue-50 rounded-xl">
                        <div class="flex items-center gap-2 mb-2">
                            <i class="fa fa-info-circle text-blue-500"></i>
                            <span class="font-medium text-blue-800">课程介绍</span>
                        </div>
                        <p class="text-sm text-blue-700">
                            本课程将深入讲解${course.name}相关知识，帮助学员掌握核心技能。课程内容丰富，注重实践操作，适合有一定基础的学员参加。
                        </p>
                    </div>

                    <button onclick="event.stopPropagation(); toggleEnroll(${courseId}).then(() => closeCourseDetailModal())" 
                            class="${isEnrolled ? 'bg-gray-200 text-gray-600 hover:bg-gray-300' : 'btn-primary text-white hover:opacity-90'} w-full py-3 rounded-xl font-medium transition-all">
                        ${isEnrolled ? '取消报名' : '立即报名'}
                    </button>
                </div>
            `;

            document.getElementById('course-detail-modal').style.display = 'flex';
        }

        function closeCourseDetailModal() {
            document.getElementById('course-detail-modal').style.display = 'none';
        }

        function prevMonth() {
            if (currentMonth === 0) {
                currentMonth = 11;
                currentYear--;
            } else {
                currentMonth--;
            }
            renderCalendar();
        }

        function nextMonth() {
            if (currentMonth === 11) {
                currentMonth = 0;
                currentYear++;
            } else {
                currentMonth++;
            }
            renderCalendar();
        }

        function goToToday() {
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            renderCalendar();
        }

        function filterByCategory(category) {
            currentCategoryFilter = category;
            
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.classList.remove('active', 'bg-gradient-primary', 'text-white', 'shadow-lg', 'shadow-purple-500/30');
                tag.classList.add('bg-gray-100', 'text-gray-600');
            });
            
            const activeTag = document.getElementById(`cat-${category}`);
            if (activeTag) {
                activeTag.classList.add('active', 'bg-gradient-primary', 'text-white', 'shadow-lg', 'shadow-purple-500/30');
                activeTag.classList.remove('bg-gray-100', 'text-gray-600');
            }
            
            renderCalendar();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadTrainingSchedule();
            renderCalendar();

            document.getElementById('mobile-menu-button').addEventListener('click', () => {
                document.getElementById('mobile-menu').classList.toggle('hidden');
            });

            document.getElementById('search-input').addEventListener('input', (e) => {
                currentSearchTerm = e.target.value;
                renderCalendar();
            });

            document.getElementById('category-filter').addEventListener('change', (e) => {
                filterByCategory(e.target.value);
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeDayModal();
                    closeCourseDetailModal();
                    closeTrainingRequestModal();
                }
            });

            // 加载必修课程
            loadRequiredCourses();
            // 加载培训进度
            loadTrainingProgress();
        });

        // ========== 培训需求提交功能 ==========
        
        // 打开培训需求弹窗
        function openTrainingRequestModal() {
            const modal = document.getElementById('training-request-modal');
            modal.style.display = 'flex';
            
            // 预填充用户信息（如果已登录）
            const currentUser = getCurrentUser();
            if (currentUser) {
                document.getElementById('req-name').value = currentUser.name || '未识别';
                document.getElementById('req-department').value = currentUser.department || '未识别';
            } else {
                document.getElementById('req-name').value = '未识别';
                document.getElementById('req-department').value = '未识别';
            }
        }

        // 关闭培训需求弹窗
        function closeTrainingRequestModal() {
            document.getElementById('training-request-modal').style.display = 'none';
            document.getElementById('training-request-form').reset();
        }

        // 获取当前登录用户
        function getCurrentUser() {
            try {
                const userStr = localStorage.getItem('learning_platform_current_user');
                if (userStr) {
                    return JSON.parse(userStr);
                }
            } catch (e) {
                console.error('获取用户信息失败:', e);
            }
            return null;
        }

        // 提交培训需求
        async function submitTrainingRequest(event) {
            event.preventDefault();
            
            const currentUser = getCurrentUser();
            if (!currentUser) {
                alert('请先登录后再提交培训需求');
                return;
            }

            // 收集表单数据
            const requestData = {
                id: 'req_' + Date.now(),
                submitterId: currentUser.id,
                submitterName: document.getElementById('req-name').value.trim() || currentUser.name,
                department: document.getElementById('req-department').value.trim() || currentUser.department,
                trainingType: document.getElementById('req-type').value,
                topic: document.getElementById('req-topic').value.trim(),
                targetAudience: document.getElementById('req-target').value.trim(),
                expectedTime: document.getElementById('req-time').value.trim(),
                description: document.getElementById('req-description').value.trim(),
                status: 'pending', // pending, approved, rejected, completed
                submitTime: new Date().toISOString(),
                updateTime: new Date().toISOString()
            };

            try {
                // 尝试发送到服务器
                const response = await fetch('/api/training-requests', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        showToast('培训需求提交成功！我们会尽快处理您的申请。');
                        closeTrainingRequestModal();
                        return;
                    }
                }
            } catch (e) {
                console.log('服务器提交失败，保存到本地:', e.message);
            }

            // 离线模式：保存到 localStorage
            saveTrainingRequestLocally(requestData);
            showToast('培训需求已提交（本地保存）');
            closeTrainingRequestModal();
        }

        // 本地保存培训需求
        function saveTrainingRequestLocally(requestData) {
            const storageKey = 'training_requests';
            let requests = JSON.parse(localStorage.getItem(storageKey) || '[]');
            requests.push(requestData);
            localStorage.setItem(storageKey, JSON.stringify(requests));
            
            // 触发数据同步事件
            if (window.DataSync) {
                window.DataSync.emit(window.DataSync.EventTypes.TRAINING_REQUEST, requestData);
            }
        }

        // Toast 提示
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.style.cssText = `position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
                padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; z-index: 9999;
                animation: fadeIn 0.3s ease; ${type === 'success' ? 'background: #10b981; color: white;' : 'background: #ef4444; color: white;'}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ========== 必修课程功能 ==========
        
        // 加载必修课程
        async function loadRequiredCourses() {
            const currentUser = getCurrentUser();
            if (!currentUser) return;

            try {
                // 尝试从服务器获取
                const response = await fetch(`/api/users/${currentUser.id}/required-courses`);
                if (response.ok) {
                    const result = await response.json();
                    if (result.success && result.data) {
                        renderRequiredCourses(result.data);
                        return;
                    }
                }
            } catch (e) {
                console.log('从服务器获取必修课程失败:', e.message);
            }

            // 离线模式：从 localStorage 获取
            const requiredKey = `required_courses_${currentUser.id}`;
            const requiredCourses = JSON.parse(localStorage.getItem(requiredKey) || '[]');
            renderRequiredCourses(requiredCourses);
        }

        // 渲染必修课程
        function renderRequiredCourses(courses) {
            const container = document.getElementById('required-courses-list');
            const badge = document.getElementById('required-course-badge');
            
            if (!container) return;

            // 更新徽章数量
            if (badge) {
                badge.textContent = courses.length;
                badge.style.display = courses.length > 0 ? 'inline-block' : 'none';
            }

            if (courses.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-6 text-gray-400">
                        <i class="fa fa-check-circle text-3xl mb-2 text-green-400"></i>
                        <p class="text-sm">暂无必修课程</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = courses.map(course => {
                const progress = course.progress || 0;
                const isCompleted = progress >= 100;
                const isUrgent = course.deadline && new Date(course.deadline) < new Date(Date.now() + 7 * 24 * 60 * 60 * 1000);
                
                return `
                    <div class="flex items-center gap-3 p-3 ${isUrgent && !isCompleted ? 'bg-red-50 border border-red-100' : 'bg-gray-50'} rounded-lg hover:bg-gray-100 transition-colors cursor-pointer" 
                         onclick="window.location.href='player.html?course=${course.id}'">
                        <div class="w-10 h-10 rounded-xl ${isCompleted ? 'bg-green-500' : 'bg-gradient-to-br from-red-400 to-red-600'} flex items-center justify-center flex-shrink-0">
                            <i class="fa ${isCompleted ? 'fa-check text-white' : 'fa-graduation-cap text-white'}"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="font-medium text-gray-800 truncate flex items-center gap-1">
                                ${course.name}
                                ${isUrgent && !isCompleted ? '<span class="px-1.5 py-0.5 bg-red-500 text-white text-[10px] rounded">即将截止</span>' : ''}
                            </div>
                            <div class="text-xs text-gray-400">${course.deadline ? '截止: ' + new Date(course.deadline).toLocaleDateString() : '无截止日期'}</div>
                            <div class="mt-1 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                                <div class="h-full ${isCompleted ? 'bg-green-500' : 'bg-primary'} rounded-full" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <div class="text-xs font-medium ${isCompleted ? 'text-green-600' : 'text-primary'}">${progress}%</div>
                    </div>
                `;
            }).join('');
        }

        // ========== 培训进度功能 ==========
        
        // 加载培训进度
        async function loadTrainingProgress() {
            const currentUser = getCurrentUser();
            if (!currentUser) return;

            try {
                // 获取用户学习数据
                let learningData = null;
                
                // 尝试从服务器获取
                try {
                    const response = await fetch(`/api/users/${currentUser.id}/learning-stats`);
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success && result.data) {
                            learningData = result.data;
                        }
                    }
                } catch (e) {
                    console.log('从服务器获取学习统计失败:', e.message);
                }

                // 离线模式：从 localStorage 获取
                if (!learningData) {
                    const dataKey = `user_learning_${currentUser.id}`;
                    learningData = JSON.parse(localStorage.getItem(dataKey) || '{}');
                }

                // 更新培训进度显示
                updateTrainingProgress(learningData);
            } catch (e) {
                console.error('加载培训进度失败:', e);
            }
        }

        // 更新培训进度显示
        function updateTrainingProgress(data) {
            const completedCount = data.completedCourses?.length || 0;
            const totalCount = data.totalCourses || 12; // 默认总课程数
            const monthlyEnrolled = data.monthlyEnrolled || 0;

            // 更新已完成培训
            const completedEl = document.getElementById('completed-training-count');
            const completedBar = document.getElementById('completed-training-bar');
            if (completedEl) {
                completedEl.textContent = `${completedCount}/${totalCount}`;
            }
            if (completedBar) {
                const percentage = totalCount > 0 ? (completedCount / totalCount * 100) : 0;
                completedBar.style.width = `${percentage}%`;
            }

            // 更新本月已报名
            const monthlyEl = document.getElementById('monthly-enrolled-count');
            if (monthlyEl) {
                monthlyEl.textContent = monthlyEnrolled;
            }
        }
    </script>
</body>
