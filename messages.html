﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消息中心 - 游雁学院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/mobile-enhanced.css?v=20260520b">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2',
                        dark: '#0f172a',
                        darkgray: '#1f2937'
                    }
                }
            },
            darkMode: 'class'
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-gradient { background-clip: text; -webkit-background-clip: text; color: transparent; background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            .bg-gradient-primary { background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        }
        body { opacity: 0; animation: pageLoad 0.5s ease forwards; }
        @keyframes pageLoad { to { opacity: 1; } }

        /* ===== 消息表格样式 ===== */
        .msg-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .msg-table th {
            background: #f8fafc;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none !important;
            white-space: nowrap;
        }
        .msg-table th:first-child { border-radius: 12px 0 0 0; }
        .msg-table th:last-child { border-radius: 0 12px 0 0; }
        .msg-table td {
            padding: 16px;
            border: none !important;
            vertical-align: top;
            font-size: 14px;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }
        .msg-table tbody tr { transition: all 0.2s ease; }
        .msg-table tr:hover td { background: #f8fafc; }
        .msg-table tr.unread-row td {
            background: #fafbff;
            font-weight: 500;
        }
        .msg-table tr.unread-row:hover td {
            background: #f8fafc;
        }
        .msg-checkbox {
            width: 18px; height: 18px;
            accent-color: #667eea;
            cursor: pointer;
            border-radius: 4px;
        }
        .unread-dot {
            display: inline-block;
            width: 9px; height: 9px;
            border-radius: 50%;
            background: #ef4444;
            flex-shrink: 0;
            margin-right: 10px;
            margin-top: 7px;
            box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
            animation: dotPulse 2s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(239,68,68,0.15); }
            50% { box-shadow: 0 0 0 6px rgba(239,68,68,0.05); }
        }

        /* ===== 类型徽章 ===== */
        .type-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 0;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .type-learning { color: #3b82f6; }
        .type-review { color: #f59e0b; }
        .type-system { color: #6366f1; }
        .type-announcement { color: #ec4899; }
        .type-training { color: #22c55e; }
        .type-exam { color: #f97316; }
        .type-default { color: #94a3b8; }

        /* ===== 消息详情弹窗 ===== */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(15,23,42,0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex; align-items: center; justify-content: center;
            animation: modalOverlayIn 0.25s ease;
            padding: 16px;
        }
        @keyframes modalOverlayIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-container {
            background: #fff;
            border-radius: 20px;
            width: 90%; max-width: 560px;
            max-height: 85vh;
            display: flex; flex-direction: column;
            box-shadow: 0 25px 80px rgba(0,0,0,0.25);
            animation: modalSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }
        @keyframes modalSlideUp { 
            from { opacity: 0; transform: translateY(40px) scale(0.96); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        .modal-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            padding: 24px 28px 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .modal-header h3 {
            color: #fff;
            font-size: 17px;
            line-height: 1.4;
        }
        .modal-header .type-badge {
            background: transparent !important;
            color: #fff !important;
            border: none !important;
            padding: 0 !important;
        }
        .modal-header .modal-time { color: rgba(255,255,255,0.9) !important; }
        .modal-body {
            padding: 24px 28px 28px;
            overflow-y: auto;
            flex: 1;
            font-size: 15px;
            line-height: 1.9;
            color: #334155;
            word-break: break-word;
        }
        .modal-body.html-content { white-space: normal; }
        .modal-body.html-content img { max-width: 100%; border-radius: 12px; margin: 12px 0; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .modal-body.html-content p { margin: 0 0 10px; line-height: 1.9; }
        .modal-body.html-content h1 { font-size: 1.4em; font-weight: 700; margin: 16px 0 8px; color: #1e293b; }
        .modal-body.html-content h2 { font-size: 1.2em; font-weight: 600; margin: 14px 0 6px; color: #334155; }
        .modal-body.html-content h3 { font-weight: 600; margin: 12px 0 6px; color: #475569; }
        .modal-body.html-content ul, .modal-body.html-content ol { padding-left: 24px; margin: 10px 0; }
        .modal-body.html-content ul li { list-style-type: disc; margin: 4px 0; }
        .modal-body.html-content a { color: #667eea; text-decoration: underline; }
        .modal-body.plain-content { white-space: pre-wrap; }
        .modal-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.2);
            color: #fff;
            cursor: pointer;
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-left: 12px;
        }
        .modal-close:hover { 
            background: rgba(255,255,255,0.35); 
            transform: rotate(90deg);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ===== 消息行交互 ===== */
        .msg-table tbody tr.msg-clickable { cursor: pointer; }
        .msg-table tbody tr.msg-clickable:hover td {
            background: #f8fafc;
        }
        .msg-table tbody tr.msg-clickable:hover td:first-child {
            box-shadow: inset 3px 0 0 #667eea;
        }
        .msg-table tbody tr.msg-clickable:active td {
            background: #f1f5f9;
            transition: background 0.05s;
        }

        /* ===== 加载骨架屏 ===== */
        .skeleton-row td { padding: 16px !important; }
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: 6px;
            height: 14px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        /* ===== 通知徽章动画 ===== */
        #notification-badge {
            animation: badgePopIn 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        @keyframes badgePopIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .badge-updated {
            animation: badgePopIn 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55) !important;
        }

        /* ===== Toast 提示 ===== */
        .toast-container {
            position: fixed; top: 24px; right: 24px; z-index: 200;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px; font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            pointer-events: auto;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
            display: flex; align-items: center; gap: 8px;
        }
        .toast-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .toast-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .toast-info { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(40px); } }
    </style>
</head>

    <script>
    (function () {
        let allMessages = [];
        const selectedIds = new Set();

        function escapeHtml(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
        function stripHtml(html) {
            if (!html) return '';
            const d = document.createElement('div');
            d.innerHTML = html;
            return d.textContent.trim() || '';
        }

        function formatTime(isoStr) {
            if (!isoStr) return '';
            const d = new Date(isoStr);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const h = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return y + '-' + m + '-' + day + ' ' + h + ':' + min;
        }

        function getTypeBadge(type) {
            const map = {
                'learning_reminder': ['📚 学习提醒', 'type-learning'],
                'application_reviewed': ['✅ 审核结果', 'type-review'],
                'system': ['🔔 系统通知', 'type-system'],
                'announcement': ['📢 平台公告', 'type-announcement'],
                'training_assign': ['🎯 培训指派', 'type-training'],
                'exam': ['📝 考试通知', 'type-exam']
            };
            const [label, cls] = map[type] || ['其他', 'type-default'];
            return '<span class="type-badge ' + cls + '">' + label + '</span>';
        }

        function renderMessages() {
            const tbody = document.getElementById('message-tbody');
            const emptyState = document.getElementById('empty-state');

            allMessages.sort((a, b) => {
                if (a.read !== b.read) return a.read ? 1 : -1;
                return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
            });

            if (allMessages.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                document.querySelector('.msg-table thead').parentElement.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            document.querySelector('.msg-table thead').parentElement.classList.remove('hidden');

            tbody.innerHTML = allMessages.map(msg => {
                const isChecked = selectedIds.has(msg.id);
                const rowClass = msg.read ? 'msg-clickable' : 'unread-row msg-clickable';
                const dotHtml = msg.read ? '' : '<span class="unread-dot"></span>';
                return '<tr class="' + rowClass + '" data-id="' + msg.id + '" onclick="openDetail(this.getAttribute(\'data-id\'))">' +
                    '<td style="text-align:center;vertical-align:middle" onclick="event.stopPropagation()">' +
                        '<input type="checkbox" class="msg-checkbox msg-row-cb" data-id="' + msg.id + '"' +
                        (isChecked ? ' checked' : '') + ' onchange="onRowCheck(this)">' +
                    '</td>' +
                    '<td>' +
                        '<div class="flex">' + dotHtml +
                            '<div>' +
                                '<div class="font-medium text-gray-800 text-sm leading-relaxed">' + escapeHtml(msg.title) + '</div>' +
                                '<div class="text-gray-400 text-xs mt-1 line-clamp-2">' + (msg.isHtml ? ('<span class="text-gray-400 text-xs">' + (stripHtml(msg.content).substring(0, 60) || '点击查看公告详情') + (stripHtml(msg.content).length > 60 ? '... ' : ' ') + '</span><span class="text-primary text-xs font-medium" style="cursor:pointer">查看详情 &rarr;</span>') : escapeHtml(msg.content)) + '</div>' +
                            '</div>' +
                        '</div>' +
                    '</td>' +
                    '<td style="vertical-align:middle" onclick="event.stopPropagation()">' + getTypeBadge(msg.type) + '</td>' +
                    '<td class="text-gray-500 text-sm" style="vertical-align:middle" onclick="event.stopPropagation()">' + formatTime(msg.createdAt) + '</td>' +
                    '<td style="vertical-align:middle;text-align:center" onclick="event.stopPropagation()">' +
                        '<button onclick="deleteSingleMessage(' + msg.id + ', event)" class="text-gray-400 hover:text-red-500 transition p-1.5 rounded-lg hover:bg-red-50" title="删除">' +
                            '<i class="fas fa-trash-alt text-sm"></i>' +
                        '</button>' +
                    '</td>' +
                '</tr>';
            }).join('');

            updateCounts();
            updateBatchButtons();
        }

        function updateCounts() {
            document.getElementById('total-count').textContent = allMessages.length;
            const unreadNum = allMessages.filter(m => !m.read).length;
            document.getElementById('unread-count').textContent = unreadNum;

            const badge = document.getElementById('notification-badge');
            if (badge) {
                if (unreadNum > 0) {
                    const oldVal = badge.textContent;
                    badge.textContent = unreadNum > 99 ? '99+' : unreadNum;
                    badge.classList.remove('hidden');
                    if (oldVal !== badge.textContent) {
                        badge.classList.remove('badge-updated');
                        void badge.offsetWidth;
                        badge.classList.add('badge-updated');
                    }
                } else {
                    badge.classList.add('hidden');
                }
            }
        }

        function updateBatchButtons() {
            const btnRead = document.getElementById('btn-batch-read');
            const btnDel = document.getElementById('btn-batch-delete');
            const hasSelection = selectedIds.size > 0;
            btnRead.disabled = !hasSelection;
            btnDel.disabled = !hasSelection;
        }

        window.toggleSelectAll = function () {
            const cb = document.getElementById('select-all');
            const rowCbs = document.querySelectorAll('.msg-row-cb');
            if (cb.checked) {
                rowCbs.forEach(function (el) { el.checked = true; selectedIds.add(parseInt(el.dataset.id)); });
            } else {
                rowCbs.forEach(function (el) { el.checked = false; selectedIds.delete(parseInt(el.dataset.id)); });
            }
            updateBatchButtons();
        };

        window.onRowCheck = function (cb) {
            const id = parseInt(cb.dataset.id);
            if (cb.checked) selectedIds.add(id); else selectedIds.delete(id);
            const allCbs = document.querySelectorAll('.msg-row-cb');
            const selectAllCb = document.getElementById('select-all');
            selectAllCb.checked = selectedIds.size === allCbs.length && allCbs.length > 0;
            selectAllCb.indeterminate = selectedIds.size > 0 && selectedIds.size < allCbs.length;
            updateBatchButtons();
        };

        window.batchMarkRead = async function () {
            if (selectedIds.size === 0) return;
            try {
                const ids = Array.from(selectedIds);
                const res = await authFetch('/api/notifications/batch-read', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: ids })
                });
                const result = await res.json();
                if (result.success) {
                    showToast('已将 ' + result.updated + ' 条消息标记为已读', 'success');
                    selectedIds.clear();
                    await loadMessages();
                } else {
                    showToast(result.error || '操作失败', 'error');
                }
            } catch (e) {
                showToast('网络错误，请重试', 'error');
            }
        };

        window.batchDelete = async function () {
            if (selectedIds.size === 0) return;
            if (!confirm('确定要删除选中的 ' + selectedIds.size + ' 条消息吗？此操作不可恢复。')) return;
            try {
                const ids = Array.from(selectedIds);
                const res = await authFetch('/api/notifications/batch-delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: ids })
                });
                const result = await res.json();
                if (result.success) {
                    showToast('已删除 ' + result.deleted + ' 条消息', 'success');
                    selectedIds.clear();
                    await loadMessages();
                } else {
                    showToast(result.error || '操作失败', 'error');
                }
            } catch (e) {
                showToast('网络错误，请重试', 'error');
            }
        };

        window.deleteSingleMessage = async function (msgId, event) {
            event.stopPropagation();
            if (!confirm('确定要删除这条消息吗？此操作不可恢复。')) return;
            try {
                const res = await authFetch('/api/notifications/' + msgId, {
                    method: 'DELETE'
                });
                const result = await res.json();
                if (result.success) {
                    showToast('已删除该消息', 'success');
                    selectedIds.delete(msgId);
                    await loadMessages();
                } else {
                    showToast(result.error || '删除失败', 'error');
                }
            } catch (e) {
                showToast('网络错误，请重试', 'error');
            }
        };

        window.markAsRead = async function (msgId) {
            try {
                const res = await authFetch('/api/notifications/' + msgId + '/read', { method: 'PUT' });
                const result = await res.json();
                if (result.success) {
                    const msg = allMessages.find(m => m.id === msgId);
                    if (msg) msg.read = true;
                    renderMessages();
                }
            } catch (e) {
                // 即使 API 失败也继续弹窗
            }
        };

        window.openDetail = async function (msgId) {
            const msg = allMessages.find(m => m.id === msgId);
            if (!msg) return;

            await markAsRead(msgId);

            document.getElementById('modal-title').textContent = msg.title || '消息详情';
            document.getElementById('modal-type-badge').innerHTML = getTypeBadge(msg.type);
            document.getElementById('modal-time').textContent = formatTime(msg.createdAt);

            const contentEl = document.getElementById('modal-content');

            if (msg.type === 'training_assign' && msg.trainingId) {
                contentEl.className = 'modal-body';
                contentEl.innerHTML = '<div class="text-center text-gray-400 py-4"><i class="fas fa-spinner fa-spin mr-2"></i>加载中...</div>';
                document.getElementById('msg-detail-modal').style.display = 'flex';
                await loadTrainingDetail(msg.trainingId, msgId);
            } else if (msg.type === 'exam' && msg.examId) {
                contentEl.className = 'modal-body';
                contentEl.innerHTML = '<div class="text-center text-gray-400 py-4"><i class="fas fa-spinner fa-spin mr-2"></i>加载中...</div>';
                document.getElementById('msg-detail-modal').style.display = 'flex';
                await loadExamDetail(msg.examId, msgId);
            } else {
                contentEl.className = 'modal-body ' + (msg.isHtml ? 'html-content' : 'plain-content');
                contentEl.innerHTML = msg.isHtml ? msg.content : escapeHtml(msg.content || '暂无内容');
                document.getElementById('msg-detail-modal').style.display = 'flex';
            }
        };

        window.closeDetail = function () {
            document.getElementById('msg-detail-modal').style.display = 'none';
        };

        async function loadTrainingDetail(trainingId, msgId) {
            try {
                const res = await fetch('/api/training/' + trainingId);
                const result = await res.json();
                if (result.success && result.data) {
                    renderTrainingDetail(result.data, msgId);
                } else {
                    document.getElementById('modal-content').innerHTML = '<p class="text-gray-500">培训信息加载失败</p>';
                }
            } catch (e) {
                document.getElementById('modal-content').innerHTML = '<p class="text-gray-500">网络错误</p>';
            }
        }

        function renderTrainingDetail(project, msgId) {
            const contentEl = document.getElementById('modal-content');
            contentEl.className = 'modal-body html-content';

            const statusMap = {
                published: ['已发布', '#6366f1'],
                pending: ['待开始', '#f59e0b'],
                active: ['进行中', '#10b981'],
                completed: ['已完成', '#3b82f6']
            };
            const [statusText, statusColor] = statusMap[project.status] || ['未知', '#6b7280'];

            let html = '';
            html += '<div style="padding-bottom:12px;border-bottom:1px solid #f1f5f9;margin-bottom:16px;">';
            html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">';
            html += '<span style="font-weight:700;color:#1e293b;font-size:16px">' + escapeHtml(project.name || '未命名培训') + '</span>';
            html += '<span style="padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;color:' + statusColor + ';background:' + statusColor + '15">' + statusText + '</span>';
            html += '</div>';
            if (project.desc) {
                html += '<p style="font-size:14px;color:#64748b;line-height:1.6">' + escapeHtml(project.desc) + '</p>';
            }
            html += '</div>';

            const stages = project.stages || [];
            const stagesCount = stages.length;

            if (stagesCount > 0) {
                html += '<div style="position:relative;padding-left:16px;">';
                html += '<div style="position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:#e2e8f0;"></div>';

                stages.forEach(function (stage, idx) {
                    html += '<div style="position:relative;margin-bottom:20px;padding-left:24px;">';
                    if (idx < stagesCount - 1) {
                        html += '<div style="position:absolute;left:-12px;top:2px;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;box-shadow:0 2px 8px rgba(99,102,241,0.3)">' + (idx + 1) + '</div>';
                    } else {
                        html += '<div style="position:absolute;left:-12px;top:2px;width:24px;height:24px;border-radius:50%;background:#fff;border:2px dashed #cbd5e1;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:11px;font-weight:700;">' + (idx + 1) + '</div>';
                    }

                    html += '<div>';
                    html += '<span style="font-weight:700;color:#1e293b;font-size:15px">' + escapeHtml(stage.name || '未命名阶段') + '</span>';

                    const otherItems = [];
                    const offlineItems = [];

                    if (stage.type === 'offline') {
                        offlineItems.push({ courseName: stage.name, time: stage.schedule, location: stage.location });
                    }

                    if (stage.videos && stage.videos.length > 0) {
                        stage.videos.forEach(function (v) {
                            otherItems.push({ type: 'video', title: v.title, duration: v.duration });
                        });
                    }

                    if (otherItems.length > 0) {
                        html += '<div style="margin-top:8px;">';
                        otherItems.forEach(function (item) {
                            html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f8fafc;border-radius:8px;margin-bottom:4px;">';
                            if (item.type === 'video') {
                                html += '<i class="fa fa-video text-blue-500"></i>';
                                html += '<span style="font-size:13px;color:#475569;flex:1">' + escapeHtml(item.title) + '</span>';
                                if (item.duration) {
                                    const mins = Math.floor(item.duration / 60);
                                    html += '<span style="font-size:12px;color:#94a3b8">' + mins + '分钟</span>';
                                }
                            }
                            html += '</div>';
                        });
                        html += '</div>';
                    }

                    if (offlineItems.length > 0) {
                        html += '<div style="margin-top:8px;">';
                        offlineItems.forEach(function(item) {
                            html += '<div style="padding:12px;background:#fff3e0;border-radius:8px;border:1px solid #ffe0b2;">';
                            html += '<span style="font-weight:600;color:#1e293b;font-size:14px">' + escapeHtml(item.courseName || '线下课') + '</span>';
                            html += '<div style="margin-top:8px;display:flex;flex-wrap:gap-3;font-size:13px;color:#64748b;">';
                            if (item.time) html += '<span><i class="fa fa-clock-o mr-1"></i>' + escapeHtml(item.time) + '</span>';
                            if (item.location) html += '<span><i class="fa fa-map-marker-alt mr-1"></i>' + escapeHtml(item.location) + '</span>';
                            html += '</div>';
                            html += '</div>';
                        });
                        html += '</div>';
                    }

                    html += '</div>';
                    html += '</div>';
                });

                html += '</div>';
            }

            html += '<button onclick="window.location.href=\'training-plan.html\';closeDetail()" style="width:100%;margin-top:16px;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:500;cursor:pointer;transition:opacity 0.2s;hover:opacity 0.9;">';
            html += '<i class="fa fa-calendar-check-o mr-2"></i>查看培训计划';
            html += '</button>';

            contentEl.innerHTML = html;
        }

        async function loadExamDetail(examId, msgId) {
            try {
                const res = await fetch('/api/exams/' + examId);
                const result = await res.json();
                if (result.success && result.data) {
                    renderExamDetail(result.data, msgId);
                } else {
                    document.getElementById('modal-content').innerHTML = '<p class="text-gray-500">考试信息加载失败</p>';
                }
            } catch (e) {
                document.getElementById('modal-content').innerHTML = '<p class="text-gray-500">网络错误</p>';
            }
        }

        function renderExamDetail(exam, msgId) {
            const contentEl = document.getElementById('modal-content');
            contentEl.className = 'modal-body html-content';

            let html = '';

            html += '<div style="padding-bottom:12px;border-bottom:1px solid #f1f5f9;margin-bottom:16px;">';
            html += '<div style="font-weight:700;color:#1e293b;font-size:16px;margin-bottom:8px">' + escapeHtml(exam.title || '未命名考试') + '</div>';
            html += '<div style="display:flex;flex-wrap:gap-4;font-size:13px;color:#64748b;">';
            if (exam.duration) html += '<span><i class="fa fa-clock-o mr-1"></i>' + exam.duration + '分钟</span>';
            if (exam.totalScore) html += '<span><i class="fa fa-score mr-1"></i>满分' + exam.totalScore + '分</span>';
            if (exam.passingScore) html += '<span><i class="fa fa-target mr-1"></i>及格线' + exam.passingScore + '分</span>';
            html += '</div>';
            html += '</div>';

            if (exam.description) {
                html += '<div style="padding:12px;background:#f8fafc;border-radius:8px;margin-bottom:16px;">';
                html += '<p style="font-size:14px;color:#475569;line-height:1.6">' + escapeHtml(exam.description) + '</p>';
                html += '</div>';
            }

            let examCardHtml = '';
            examCardHtml += '<div style="padding:16px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:12px;">';
            examCardHtml += '<div style="display:flex;align-items:center;gap:12px;">';
            examCardHtml += '<div style="width:48px;height:48px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-center;">';
            examCardHtml += '<i class="fa fa-file-text text-orange-500 text-xl"></i>';
            examCardHtml += '</div>';
            examCardHtml += '<div style="flex:1;">';
            examCardHtml += '<div style="font-weight:600;color:#92400e;">' + escapeHtml(exam.title || '考试') + '</div>';
            examCardHtml += '<div style="font-size:13px;color:#b45309;margin-top:2px;">';
            if (exam.duration) examCardHtml += exam.duration + '分钟 ';
            if (exam.totalScore) examCardHtml += '共' + exam.totalScore + '分';
            examCardHtml += '</div>';
            examCardHtml += '</div>';
            examCardHtml += '</div>';
            examCardHtml += '<button onclick="startExam(' + (exam.id || '') + ')" style="width:100%;margin-top:12px;padding:10px;border:none;border-radius:8px;background:#fff;color:#92400e;font-weight:500;cursor:pointer;transition:background 0.2s;hover:bg:#fef9c3;">';
            examCardHtml += '<i class="fa fa-play-circle mr-2"></i>开始考试';
            examCardHtml += '</button>';
            examCardHtml += '<p style="text-center;margin-top:14px;font-size:12px;color:#94a3b8"><i class="fa fa-circle-info" style="margin-right:4px"></i>点击按钮后将开始计时，请确保网络连接稳定</p>';
            examCardHtml += '</div>';

            html += examCardHtml;
            contentEl.innerHTML = html;
        }

        function startExam(examId) {
            window.location.href = 'exam.html?id=' + examId;
        }

        // 获取认证 Token
        function getAuthToken() {
            return localStorage.getItem('token') || sessionStorage.getItem('token');
        }

        // 带认证的 fetch 封装
        async function authFetch(url, options = {}) {
            const token = getAuthToken();
            const headers = options.headers || {};
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }
            return fetch(url, { ...options, headers });
        }
        async function loadMessages() {
            const token = getAuthToken();
            if (!token) {
                console.warn('[Messages] 未登录，显示空列表');
                allMessages = [];
                renderMessages();
                return;
            }
            try {
                const res = await authFetch('/api/notifications');
                const result = await res.json();
                allMessages = result.success ? (result.data || []) : [];
            } catch (e) {
                allMessages = [
                    { id: 1, title: '欢迎加入游雁学院', content: '欢迎您加入游雁学院学习平台！在这里您可以学习各类课程，参加培训活动。', type: 'system', read: false, createdAt: '2026-01-15 09:00' },
                    { id: 2, title: '新员工入职培训通知', content: '您已被指派参加新员工入职培训，请及时查看培训计划并按时参加。', type: 'training_assign', read: false, createdAt: '2026-01-14 14:30', trainingId: 1 },
                    { id: 3, title: '课程学习提醒', content: '您有3门课程待学习，请尽快完成学习进度。', type: 'learning_reminder', read: true, createdAt: '2026-01-13 10:00' },
                    { id: 4, title: '平台公告：春节放假通知', content: '<p>春节放假安排：2026年1月28日至2月3日放假调休，共7天。</p><p>放假期间平台正常开放，但客服响应时间可能延迟。</p>', type: 'announcement', isHtml: true, read: true, createdAt: '2026-01-12 09:00' },
                    { id: 5, title: '考试通知', content: '您有一场考试即将开始，请做好准备。', type: 'exam', read: false, createdAt: '2026-01-11 16:00', examId: 1 }
                ];
            }
            renderMessages();
        }

        function showToast(message, type) {
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const icons = { success: '✓', error: '✕', info: 'ℹ' };
            const el = document.createElement('div');
            el.className = 'toast toast-' + (type || 'info');
            el.innerHTML = '<span style="font-size:16px">' + (icons[type] || 'ℹ') + '</span>' + message;
            container.appendChild(el);
            setTimeout(() => {
                if (el.parentNode) el.remove();
                if (container.children.length === 0) container.remove();
            }, 3000);
        }

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeDetail();
        });

        (async function () {
            // 不再依赖 isUserLoggedIn，改为直接检查 token
            // 最多等待 5 秒，给 auth-guard 时间完成初始化
            await new Promise(resolve => {
                let attempts = 0;
                const check = setInterval(() => {
                    attempts++;
                    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                    if (token || attempts >= 50) {
                        clearInterval(check);
                        resolve();
                    }
                }, 100);
            });
            await loadMessages();

            window.addEventListener('userProfileUpdated', () => {
                loadMessages();
            });
        })();
    })();
    </script>
</body>
</html>
