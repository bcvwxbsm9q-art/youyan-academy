<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>培训签到 - 游雁学院</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#667eea', secondary: '#764ba2' } } }
    }
  </script>
  <style>
    body { opacity: 0; animation: pageLoad 0.4s ease forwards; }
    @keyframes pageLoad { to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.4s ease-out; }
    .text-gradient { background-clip: text; -webkit-background-clip: text; color: transparent; background-image: linear-gradient(135deg, #667eea, #764ba2); }
    .bg-gradient-primary { background-image: linear-gradient(135deg, #667eea, #764ba2); }
    .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.12); animation: toastIn 0.3s ease; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .toast.success { background: #10b981; color: #fff; }
    .toast.error { background: #ef4444; color: #fff; }
    .code-input { width: 48px; height: 56px; font-size: 24px; text-align: center; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; transition: all 0.2s; }
    .code-input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- 顶部导航 -->
  <header class="bg-white shadow-sm sticky top-0 z-40 border-b border-slate-100">
    <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
      <button onclick="history.back()" class="p-2 rounded-lg hover:bg-slate-100 transition text-slate-500">
        <i class="fa fa-arrow-left"></i>
      </button>
      <h1 class="text-base font-semibold text-slate-800">培训签到</h1>
      <div class="w-8"></div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="max-w-md mx-auto px-4 py-6">
    <!-- 加载状态 -->
    <div id="loading-state" class="text-center py-20">
      <i class="fa fa-spinner fa-spin text-3xl text-primary mb-4 block"></i>
      <p class="text-slate-400">加载中...</p>
    </div>

    <!-- 错误状态 -->
    <div id="error-state" class="hidden text-center py-20">
      <i class="fa fa-exclamation-circle text-5xl text-red-300 mb-4 block"></i>
      <p class="text-slate-500 text-lg mb-2" id="error-title">加载失败</p>
      <p class="text-sm text-slate-400 mb-6" id="error-desc"></p>
      <button onclick="location.reload()" class="px-6 py-2.5 bg-gradient-primary text-white rounded-xl text-sm font-medium hover:opacity-90 transition">重试</button>
    </div>

    <!-- 签到表单 -->
    <div id="signin-form" class="hidden">
      <!-- 培训信息卡片 -->
      <div id="training-info" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-6 slide-up">
      </div>

      <!-- 签到码输入 -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 slide-up">
        <p class="text-sm font-semibold text-slate-800 mb-4 text-center">请输入签到码</p>
        <div class="flex justify-center gap-3 mb-4" id="code-boxes">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" data-idx="0">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" data-idx="1">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" data-idx="2">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" data-idx="3">
        </div>
        <p class="text-xs text-slate-400 text-center mb-4">向培训现场工作人员获取签到码</p>
        <button onclick="submitSignin()" id="submit-btn" class="w-full py-3 bg-gradient-primary text-white rounded-xl font-semibold text-sm hover:opacity-90 transition disabled:opacity-50 disabled:cursor-not-allowed">
          <i class="fa fa-check-circle mr-2"></i>确认签到
        </button>
      </div>

      <!-- 一条龙快捷入口 -->
      <div id="quick-links" class="mt-6 space-y-3 slide-up">
      </div>
    </div>

    <!-- 签到成功 -->
    <div id="success-state" class="hidden text-center py-16">
      <div class="w-24 h-24 rounded-full bg-emerald-50 flex items-center justify-center mx-auto mb-6">
        <i class="fa fa-check-circle text-5xl text-emerald-400"></i>
      </div>
      <h2 class="text-2xl font-bold text-slate-800 mb-2">签到成功！</h2>
      <p class="text-slate-400 mb-6">您已完成本次培训签到</p>
      <div id="success-links" class="space-y-3 max-w-xs mx-auto">
      </div>
    </div>
  </main>

  <script src="js/auth-guard.js?v=20260526c"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const trainingId = params.get('id');
    let trainingData = null;
    let user = null;

    function getUser() {
      const s = localStorage.getItem('user') || sessionStorage.getItem('user');
      try { return s ? JSON.parse(s) : null; } catch(e) { return null; }
    }

    function toast(msg, type) {
      const el = document.createElement('div');
      el.className = 'toast ' + (type || 'success');
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function getCode() {
      const inputs = document.querySelectorAll('.code-input');
      return Array.from(inputs).map(i => i.value).join('');
    }

    async function loadTraining() {
      user = getUser();
      if (!user) {
        showError('请先登录', '登录后即可签到');
        return;
      }
      if (!trainingId) {
        showError('参数错误', '缺少培训ID');
        return;
      }
      try {
        const res = await fetch('/api/training/' + trainingId);
        const event = await res.json();
        if (!event || event.error) {
          showError('培训不存在', '无法找到该培训事件');
          return;
        }
        trainingData = event;
        if (!event.signinEnabled) {
          showError('签到未开启', '该培训尚未开启签到功能');
          return;
        }
        renderTraining();
      } catch (e) {
        showError('网络错误', '无法连接到服务器');
      }
    }

    function renderTraining() {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('signin-form').classList.remove('hidden');

      const e = trainingData;
      const start = e.startTime ? (e.startTime.includes('T') ? e.startTime.replace('T', ' ') : e.startTime) : '-';
      const end = e.endTime ? (e.endTime.includes('T') ? e.endTime.replace('T', ' ') : e.endTime) : '-';

      document.getElementById('training-info').innerHTML = `
        <div class="flex items-start gap-3">
          <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center flex-shrink-0">
            <i class="fa fa-graduation-cap text-white text-lg"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h2 class="font-bold text-slate-800 text-sm mb-1">${e.name || '未命名培训'}</h2>
            <p class="text-xs text-slate-500 mb-1"><i class="fa fa-tag mr-1 text-slate-400"></i>${e.project || '-'} · ${e.instructor || '-'}</p>
            <p class="text-xs text-slate-500 mb-1"><i class="fa fa-map-marker mr-1 text-slate-400"></i>${e.location || '-'}</p>
            <p class="text-xs text-slate-500"><i class="fa fa-clock-o mr-1 text-slate-400"></i>${start} ~ ${end}</p>
          </div>
        </div>
      `;

      // 快捷入口：调研 + 考试
      const links = [];
      if (e.linkedSurveyId) {
        links.push(`
          <a href="survey.html?id=${e.linkedSurveyId}&trainingId=${e.id}&stageIdx=0" class="flex items-center gap-3 p-4 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-blue-200 transition">
            <div class="w-10 h-10 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0">
              <i class="fa fa-poll text-blue-500"></i>
            </div>
            <div class="flex-1">
              <p class="text-sm font-semibold text-slate-800">填写满意度调研</p>
              <p class="text-xs text-slate-400">培训结束后请填写反馈问卷</p>
            </div>
            <i class="fa fa-chevron-right text-slate-300 text-xs"></i>
          </a>
        `);
      }
      if (e.linkedExamId) {
        links.push(`
          <a href="exam.html?id=${e.linkedExamId}" class="flex items-center gap-3 p-4 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-amber-200 transition">
            <div class="w-10 h-10 rounded-lg bg-amber-50 flex items-center justify-center flex-shrink-0">
              <i class="fa fa-file-alt text-amber-500"></i>
            </div>
            <div class="flex-1">
              <p class="text-sm font-semibold text-slate-800">参加考试</p>
              <p class="text-xs text-slate-400">完成培训后参加在线考试</p>
            </div>
            <i class="fa fa-chevron-right text-slate-300 text-xs"></i>
          </a>
        `);
      }
      document.getElementById('quick-links').innerHTML = links.join('');
    }

    function showError(title, desc) {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('error-state').classList.remove('hidden');
      document.getElementById('error-title').textContent = title;
      document.getElementById('error-desc').textContent = desc;
    }

    async function submitSignin() {
      const code = getCode();
      if (code.length < 4) {
        toast('请输入完整的签到码', 'error');
        return;
      }
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>提交中...';

      try {
        const res = await fetch('/api/training/' + trainingId + '/signin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: user.id, code })
        });
        const result = await res.json();
        if (result.success) {
          showSuccess();
        } else {
          toast(result.error || '签到失败', 'error');
          btn.disabled = false;
          btn.innerHTML = '<i class="fa fa-check-circle mr-2"></i>确认签到';
        }
      } catch (e) {
        toast('网络错误，请重试', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-check-circle mr-2"></i>确认签到';
      }
    }

    function showSuccess() {
      document.getElementById('signin-form').classList.add('hidden');
      document.getElementById('success-state').classList.remove('hidden');

      const e = trainingData;
      const links = [];
      if (e.linkedSurveyId) {
        links.push(`
          <a href="survey.html?id=${e.linkedSurveyId}&trainingId=${e.id}&stageIdx=0" class="block w-full py-3 bg-blue-500 text-white rounded-xl font-semibold text-sm hover:bg-blue-600 transition text-center">
            <i class="fa fa-poll mr-2"></i>去填写满意度调研
          </a>
        `);
      }
      if (e.linkedExamId) {
        links.push(`
          <a href="exam.html?id=${e.linkedExamId}" class="block w-full py-3 bg-amber-500 text-white rounded-xl font-semibold text-sm hover:bg-amber-600 transition text-center">
            <i class="fa fa-file-alt mr-2"></i>去参加考试
          </a>
        `);
      }
      links.push(`
        <a href="center.html" class="block w-full py-3 bg-slate-100 text-slate-600 rounded-xl font-semibold text-sm hover:bg-slate-200 transition text-center">
          <i class="fa fa-home mr-2"></i>返回个人中心
        </a>
      `);
      document.getElementById('success-links').innerHTML = links.join('');
    }

    // 签到码输入框交互
    document.addEventListener('DOMContentLoaded', () => {
      const inputs = document.querySelectorAll('.code-input');
      inputs.forEach((input, idx) => {
        input.addEventListener('input', (e) => {
          const val = e.target.value;
          if (val && idx < inputs.length - 1) {
            inputs[idx + 1].focus();
          }
          if (val && idx === inputs.length - 1) {
            submitSignin();
          }
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && idx > 0) {
            inputs[idx - 1].focus();
          }
        });
        input.addEventListener('paste', (e) => {
          e.preventDefault();
          const paste = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 4);
          paste.split('').forEach((ch, i) => {
            if (inputs[i]) inputs[i].value = ch;
          });
          if (inputs[paste.length - 1]) inputs[paste.length - 1].focus();
          if (paste.length === 4) setTimeout(submitSignin, 100);
        });
      });
      loadTraining();
    });
  </script>
</body>
</html>
