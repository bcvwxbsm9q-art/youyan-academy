<!DOCTYPE html>

    <link rel="stylesheet" href="css/mobile-enhanced.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2',
                        dark: '#0f172a',
                        darkgray: '#1f2937'
                    }
                }

            darkMode: 'class'
        }

    <style type="text/tailwindcss">
        @layer utilities {
            .text-gradient { background-clip: text; -webkit-background-clip: text; color: transparent; background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            .bg-gradient-primary { background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            .card-hover { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
            .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(102, 126, 234, 0.15); }
            .level-chief { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
            .level-senior { background: linear-gradient(135deg, #10b981, #059669); }
            .level-intermediate { background: linear-gradient(135deg, #3b82f6, #2563eb); }
            .level-junior { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
            .level-trainee { background: linear-gradient(135deg, #6b7280, #4b5563); }
        }
        body { opacity: 0; animation: pageLoad 0.5s ease forwards; }
        @keyframes pageLoad { to { opacity: 1; } }
        
        /* 讲师卡片样式 */
        .lecturer-card {
            background: white;
            border-radius: 16px;
            padding: 20px 14px 16px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .lecturer-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }
        .lecturer-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 16px;
            overflow: hidden;
            border: 3px solid #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .lecturer-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .lecturer-level {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            margin-bottom: 12px;
        }
        .lecturer-name {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 4px;
        }
        .lecturer-title {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 12px;
        }
        .lecturer-stats {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 13px;
            color: #6b7280;
        }
        .lecturer-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .lecturer-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            margin-top: 8px;
            min-height: 22px;
        }
        .lecturer-tag {
            padding: 3px 10px;
            background: #f3f4f6;
            border-radius: 12px;
            font-size: 11px;
            color: #6b7280;
            font-weight: 500;
            white-space: nowrap;
        }
        .lecturer-tag.more {
            background: #f3f4f6;
            color: #9ca3af;
            border-color: #e5e7eb;
        }
    </style>
</head>

    <script>
        // 退出登录（使用统一认证模块）
        function handleLogout() {
            AuthGuard.logout();
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 px-6 py-3 rounded-lg text-white font-medium z-50 shadow-lg ' + (type === 'success' ? 'bg-green-500' : 'bg-red-500');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthAndUpdateUI();
            loadNotificationCount();
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');
            if (mobileMenuButton && mobileMenu) {
                mobileMenuButton.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
            }
        });
        
        // 加载未读通知数量
        async function loadNotificationCount() {
            try {
                const res = await fetch('/api/notifications');
                if (!res.ok) return;
                const result = await res.json();
                const notifications = result.data || [];
                const unreadCount = notifications.filter(n => !n.read).length;
                
                const badge = document.getElementById('notification-badge');
                if (badge) {
                    if (unreadCount > 0) {
                        badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                }
            } catch(e) {
                console.error('加载通知数量失败:', e);
            }
        }
        
        function openApplyModal() {
            const existing = document.querySelector('.apply-modal-overlay');
            if (existing) existing.remove();
            
            // 获取当前登录用户信息
            const userStr = localStorage.getItem('user') || sessionStorage.getItem('user');
            let currentUser = null;
            if (userStr) {
                try {
                    currentUser = JSON.parse(userStr);
                } catch(e) {}
            }
            
            const modal = document.createElement('div');
            modal.className = 'apply-modal-overlay fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center';
            modal.onclick = function(e) { if (e.target === this) this.remove(); };
            
            modal.innerHTML = `
                <div class="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] flex flex-col shadow-xl m-4 overflow-hidden" onclick="event.stopPropagation()">
                    <div class="bg-gradient-primary px-6 py-4 flex-shrink-0">
                        <h2 class="text-xl font-bold text-white"><i class="fa fa-edit mr-2"></i>申请成为讲师</h2>
                    </div>
                    <div class="flex-1 overflow-y-auto px-6 py-5 space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">姓名 <span class="text-red-500">*</span></label>
                                <input type="text" id="apply-name" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary bg-gray-50" placeholder="请输入您的姓名" ${currentUser ? `value="${currentUser.real_name || currentUser.realName || ''}"` : ''} readonly>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">部门</label>
                                <input type="text" id="apply-dept" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary bg-gray-50" placeholder="如：技术部" ${currentUser ? `value="${currentUser.department || ''}"` : ''} readonly>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">擅长领域 <span class="text-red-500">*</span></label>
                            <div class="flex gap-2 mb-2">
                                <input type="text" id="apply-skill-input" class="flex-1 px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary" placeholder="输入技能后回车添加">
                            </div>
                            <div id="apply-skills-tags" class="flex flex-wrap gap-2"></div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">授课经验 <span class="text-red-500">*</span></label>
                            <select id="apply-experience" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary">
                                <option value="">请选择授课经验</option>
                                <option value="none">暂无</option>
                                <option value="1-2">1-2次</option>
                                <option value="3-4">3-4次</option>
                                <option value="5+">5次及以上</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">个人简介</label>
                            <textarea id="apply-intro" rows="3" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary" placeholder="简单介绍您的教学经验或专长..."></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">申请原因 <span class="text-red-500">*</span></label>
                            <textarea id="apply-reason" rows="3" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary" placeholder="请说明您申请成为讲师的原因和期望..."></textarea>
                        </div>
                    </div>
                    <div class="px-6 pb-5 pt-2 border-t flex gap-3">
                        <button onclick="this.closest('.apply-modal-overlay').remove()" class="flex-1 py-3 rounded-xl bg-gray-100 text-gray-600 font-medium hover:bg-gray-200 transition">取消</button>
                        <button onclick="submitApply()" class="flex-1 py-3 rounded-xl bg-gradient-primary text-white font-medium hover:opacity-90 transition"><i class="fa fa-paper-plane mr-1"></i>提交申请</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // 技能标签输入
            const skillInput = modal.querySelector('#apply-skill-input');
            applySkills = [];
            skillInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const val = this.value.trim();
                    if (val && !applySkills.includes(val)) {
                        applySkills.push(val);
                        renderSkillTags(applySkills);
                    }
                    this.value = '';
                }
            });
        }
        
        function renderSkillTags(skills) {
            const container = document.getElementById('apply-skills-tags');
            if (!container) return;
            container.innerHTML = skills.map(s => `
                <span class="inline-flex items-center gap-1 px-3 py-1 bg-primary/10 text-primary rounded-full text-sm">
                    ${s}
                    <button onclick="this.parentElement.remove(); removeSkill('${s}')" class="hover:text-red-500">&times;</button>
                </span>
            `).join('');
        }
        
        let applySkills = [];
        function renderSkillTags(list) {
            applySkills = list;
            const container = document.getElementById('apply-skills-tags');
            if (!container) return;
            container.innerHTML = list.map(s => `
                <span class="inline-flex items-center gap-1 px-3 py-1 bg-primary/10 text-primary rounded-full text-sm">
                    ${s}
                    <button onclick="this.parentElement.remove(); removeApplySkill('${s.replace(/'/g, "\\'")}')" class="hover:text-red-500">&times;</button>
                </span>
            `).join('');
        }
        function removeApplySkill(s) {
            applySkills = applySkills.filter(x => x !== s);
            renderSkillTags(applySkills);
        }
        
        async function submitApply() {
            const name = document.getElementById('apply-name').value.trim();
            if (!name) { showToast('请输入姓名', 'error'); return; }
            if (applySkills.length === 0) { showToast('请至少添加一个擅长领域', 'error'); return; }
            
            const experience = document.getElementById('apply-experience').value;
            if (!experience) { showToast('请选择授课经验', 'error'); return; }
            
            const reason = document.getElementById('apply-reason').value.trim();
            if (!reason) { showToast('请填写申请原因', 'error'); return; }
            
            const body = {
                name,
                department: document.getElementById('apply-dept').value.trim(),
                skills: applySkills,
                experience,
                intro: document.getElementById('apply-intro').value.trim(),
                reason
            };
            
            try {
                const res = await fetch('/api/lecturer-applications', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (res.ok) {
                    showToast('申请已提交，请等待审核');
                    document.querySelector('.apply-modal-overlay')?.remove();
                } else {
                    showToast('提交失败，请重试', 'error');
                }
            } catch(e) {
                showToast('网络错误，请重试', 'error');
            }
        }
    </script>
</body>
</html>
