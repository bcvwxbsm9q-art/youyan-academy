<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <!-- 移动端增强样式 -->
    <link rel="stylesheet" href="css/mobile-enhanced.css">
    <!-- 统一的 Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2',
                        dark: '#0f172a',
                        darkgray: '#1f2937',
                        lightgray: '#9ca3af',
                        accent: '#f59e0b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in-out',
                        'slide-up': 'slideUp 0.5s ease-in-out',
                        'scale-in': 'scaleIn 0.3s ease-in-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(30px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        scaleIn: {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            },
            darkMode: 'class'
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-gradient {
                background-clip: text;
                -webkit-background-clip: text;
                color: transparent;
                background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
            .bg-gradient-primary {
                background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
            .card-hover {
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .card-hover:hover {
                transform: translateY(-8px);
                box-shadow: 0 20px 25px -5px rgba(102, 126, 234, 0.15), 0 10px 10px -5px rgba(102, 126, 234, 0.1);
            }
            .line-clamp-2 {
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .line-clamp-3 {
                display: -webkit-box;
                -webkit-line-clamp: 3;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
        }
        
        /* 轮播图样式优化 */
        #banner-container {
            /* 高度由第一张图片（relative）自动撑开 */
            min-height: 300px;
        }
        
        /* 注意：不要在这里设置 .carousel-slide 的 position，由 JS 控制 */
        
        .carousel-slide img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }
        
        /* absolute 叠放的 slide 必须充满容器 */
        .carousel-slide[data-idx]:not([data-idx="0"]) {
            position: absolute !important;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        
        body {
            opacity: 0;
            animation: pageLoad 0.5s ease forwards;
        }
        
        @keyframes pageLoad {
            to {
                opacity: 1;
            }
        }
    </style>
</head>

                <nav class="flex flex-col space-y-1">

    <script src="js/data-sync.js?v=2024010801"></script>
    <script src="data-api.js?v=2024010801"></script>
    <script src="js/index-enhanced.js?v=2024010801"></script>
    <script src="js/auth-modal.js?v=2024010801"></script>
    <script src="js/auth-guard.js?v=2024010801"></script>
    <script src="js/notification.js?v=20260623"></script>
    <script>
        // API 基础 URL
        const API_BASE = window.location.origin + '/api';

        // 退出登录（使用统一认证模块）
        function handleLogout() {
            AuthGuard.logout();
        }

        // Toast 提示
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 px-6 py-3 rounded-lg text-white font-medium z-50 shadow-lg ${type === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // 用户菜单切换
        document.addEventListener('DOMContentLoaded', () => {
            AuthGuard.updateUserInfo();
            
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');
            
            if (mobileMenuButton && mobileMenu) {
                mobileMenuButton.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
            }
        });
    </script>
